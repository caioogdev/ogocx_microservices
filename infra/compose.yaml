services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: ogocx_rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - ogocx_rabbitmq:/var/lib/rabbitmq

  user-service-postgres:
    image: postgres:16
    container_name: ogocx_userservice_postgresql
    ports:
      - "5456:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER_SERVICE_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_USER_SERVICE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_USER_SERVICE_DB}
    volumes:
      - ogocx_userservice_postgresql:/var/lib/postgresql/data

  auth-service-postgres:
    image: postgres:16
    container_name: ogocx_authservice_postgresql
    ports:
      - "5457:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_AUTH_SERVICE_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_AUTH_SERVICE_PASSWORD}
      POSTGRES_DB: ${POSTGRES_AUTH_SERVICE_DB}
    volumes:
      - ogocx_authservice_postgresql:/var/lib/postgresql/data

  elasticsearch:
    image: elasticsearch:9.2.8
    container_name: ogocx_elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - ogocx_elasticsearch:/usr/share/elasticsearch/data

volumes:
  ogocx_rabbitmq:
  ogocx_userservice_postgresql:
  ogocx_authservice_postgresql:
  ogocx_elasticsearch: