spring:
  application:
    name: gateway
  config:
    import: optional:file:.env[.properties]

  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            cors-configurations:
              '[/**]':
                allowed-origins:
                  - "https://app.ogocx.com"
                  - "http://localhost:3000"
                allowed-methods: [ GET, POST, PUT, PATCH, DELETE,]
                allowed-headers: "*"
                exposed-headers: [ X-Correlation-Id ]
                allow-credentials: true
                max-age: 3600
          routes:
            - id: user-service
              uri: ${USER_SERVICE_URL}
              predicates:
                - Path=/users/**
            - id: auth-service
              uri: ${AUTH_SERVICE_URL}
              predicates:
                - Path=/auth/**
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 10
                    redis-rate-limiter.burstCapacity: 20
                    key-resolver: "#{@ipKeyResolver}"

gateway:
  public-routes:
    - /auth/sign-in
    - /auth/refresh

jwt:
  secret: ${JWT_SECRET}

server:
  port: 8082